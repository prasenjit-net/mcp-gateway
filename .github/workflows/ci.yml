name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Build UI
        run: npm run build
        working-directory: ui

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./...

      - name: Build Go binary
        run: go build -ldflags="-s -w" -o mcp-gateway .

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-gateway-linux-amd64
          path: mcp-gateway
          retention-days: 7
