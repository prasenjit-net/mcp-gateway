name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Stage 1: compute the next semver tag ───────────────────────────────────
  version:
    name: Compute Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag --list 'v*.*.*' | sort -V | tail -1)
          [ -z "$LATEST" ] && LATEST="v0.0.0"
          echo "Previous version: $LATEST"
          SEMVER="${LATEST#v}"
          MAJOR=$(echo "$SEMVER" | cut -d. -f1)
          MINOR=$(echo "$SEMVER" | cut -d. -f2)
          PATCH=$(echo "$SEMVER" | cut -d. -f3)
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Next version: $NEXT"
          echo "tag=$NEXT"            >> "$GITHUB_OUTPUT"
          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

  # ── Stage 2 (parallel): lint, test, build UI ──────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go vet
        run: go vet ./...

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: TypeScript type-check
        run: npx tsc --noEmit
        working-directory: ui

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go test
        run: go test ./...

  build-ui:
    name: Build UI
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        run: npm ci
        working-directory: ui

      - name: Build UI
        run: npm run build
        working-directory: ui

      - name: Upload UI dist
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 1

  # ── Stage 3: cross-compile binaries (matrix) ──────────────────────────────
  build-binaries:
    name: Build / ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: [lint, test, build-ui]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          OUT="mcp-gateway-${GOOS}-${GOARCH}${EXT}"
          go build -ldflags="-s -w -X main.version=${VERSION}" -o "$OUT" .
          echo "Built: $(ls -lh $OUT)"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mcp-gateway-${{ matrix.goos }}-${{ matrix.goarch }}
          path: mcp-gateway-${{ matrix.goos }}-${{ matrix.goarch }}*
          retention-days: 1

  # ── Stage 4: tag + publish GitHub release ─────────────────────────────────
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [version, build-binaries]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          pattern: mcp-gateway-*
          path: dist/
          merge-multiple: true

      - name: Create checksums
        working-directory: dist
        run: sha256sum * > checksums.txt && cat checksums.txt

      - name: Tag release
        env:
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: "MCP Gateway ${{ needs.version.outputs.tag }}"
          body: |
            ## MCP Gateway ${{ needs.version.outputs.tag }}

            Released by @${{ github.actor }} via `${{ inputs.bump }}` bump.

            ### Downloads
            | Platform | Architecture | File |
            |----------|-------------|------|
            | Linux    | amd64        | `mcp-gateway-linux-amd64` |
            | Linux    | arm64        | `mcp-gateway-linux-arm64` |
            | macOS    | amd64 (Intel)| `mcp-gateway-darwin-amd64` |
            | macOS    | arm64 (Apple Silicon) | `mcp-gateway-darwin-arm64` |
            | Windows  | amd64        | `mcp-gateway-windows-amd64.exe` |

            Verify downloads with `checksums.txt`.
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
